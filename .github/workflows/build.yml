name: Build thesis PDF

# Compiles the template with XeLaTeX on every push/PR so the build is verified,
# and uploads the resulting PDFs as artifacts.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile main thesis (XeLaTeX + BibTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_xelatex: true

      - name: Compile standalone book spine
        uses: xu-cheng/latex-action@v3
        with:
          root_file: bookspine.tex
          latexmk_use_xelatex: true

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: ntu-thesis-pdf
          path: |
            main.pdf
            bookspine.pdf
